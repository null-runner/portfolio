<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nicholas Mariani — Portfolio</title><style>
*{box-sizing:border-box}
:root{--bg:#0a0e14;--panel:#111823;--ink:#e2e9f2;--muted:#8b99ab;--acc:#3fd0e0;--acc-ink:#06222a;--acc-dim:#1c5560;--amber:#f0b23e;--line2:#2c3b4f;--grid:rgba(63,208,224,.03);--serif:Georgia,'Times New Roman',serif;--mono:'JetBrains Mono','Cascadia Code',Consolas,monospace}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--ink);font-family:Verdana,Arial,sans-serif;line-height:1.55;text-align:center;padding:24px;background-image:radial-gradient(ellipse 70% 55% at 50% 0%,var(--grid),transparent),repeating-linear-gradient(0deg,transparent,transparent 47px,var(--grid) 48px),repeating-linear-gradient(90deg,transparent,transparent 47px,var(--grid) 48px)}
main{width:min(540px,100%);animation:enter .7s ease both}
@keyframes enter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.eyebrow{font:700 11px var(--mono);letter-spacing:.16em;text-transform:uppercase;color:var(--acc)}
.eyebrow::before{content:"▸ ";opacity:.55}
h1{font:400 clamp(30px,6vw,46px)/1.04 var(--serif);margin:16px 0 12px;letter-spacing:-.02em}
h1 .hl{color:var(--acc);font-style:italic}
p.lead{color:var(--muted);margin:0 0 30px;font-size:15px}
.links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
a.button{display:inline-flex;align-items:center;justify-content:center;min-height:46px;border:1px solid var(--line2);padding:12px 24px;text-decoration:none;color:var(--ink);background:var(--panel);font-weight:700;font-size:14px;transition:border-color .2s,transform .15s}
a.button:hover{border-color:var(--acc);transform:translateY(-1px)}
a.button.primary{background:var(--acc);color:var(--acc-ink);border-color:var(--acc)}
a.button:focus-visible{outline:2px solid var(--amber);outline-offset:3px}
.tag{margin-top:26px;font:600 11px var(--mono);color:var(--acc-dim);letter-spacing:.06em}
noscript p{color:var(--muted);margin-top:20px;font-size:13px}
@media(prefers-reduced-motion:reduce){main{animation:none}}
